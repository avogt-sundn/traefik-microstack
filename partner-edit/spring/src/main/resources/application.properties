spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres-partner-edit}:5432/app-partner-edit-db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Server Configuration
server.port=8446
server.ssl.enabled=true
server.ssl.key-store=classpath:certs/keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.http2.enabled=true
server.ssl.client-auth=none
# SSL bundle for outbound calls to gateway
spring.ssl.bundle.jks.gateway.truststore.location=classpath:certs/truststore.p12
spring.ssl.bundle.jks.gateway.truststore.password=changeit
spring.ssl.bundle.jks.gateway.truststore.type=PKCS12
logging.level.com.example.partneredit=DEBUG
partner.search.index.url=https://gateway/api/partner-search/spring/index/partner
