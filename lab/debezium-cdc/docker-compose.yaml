networks:
  default:
    name: docker-default-network
    external: true

services:
  kafka-lab:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-lab:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-lab:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-lab:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    volumes:
      - kafka-lab-data:/var/lib/kafka/data

  debezium-connect-lab:
    image: quay.io/debezium/connect:3.1
    ports:
      - "8083:8083"
    depends_on:
      kafka-lab:
        condition: service_healthy
      postgres-lab:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka-lab:9092
      GROUP_ID: debezium-connect-lab
      CONFIG_STORAGE_TOPIC: _debezium_configs
      OFFSET_STORAGE_TOPIC: _debezium_offsets
      STATUS_STORAGE_TOPIC: _debezium_status
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 45s

  proof-debezium-cdc:
    build:
      context: .
    depends_on:
      debezium-connect-lab:
        condition: service_healthy
      postgres-lab:
        condition: service_healthy
    environment:
      PGHOST: postgres-lab
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: app-lab-db
      CONNECT_URL: http://debezium-connect-lab:8083
      KAFKA_BROKER: kafka-lab:9092

volumes:
  kafka-lab-data:
