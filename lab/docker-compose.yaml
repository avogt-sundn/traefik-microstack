networks:
  default:
    name: docker-default-network
    external: true

services:
  postgres-lab:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app-lab-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - pg-lab-data:/var/lib/postgresql

  proof-bigint-vs-uuid:
    build:
      context: ./bigint-vs-uuid
    depends_on:
      postgres-lab:
        condition: service_healthy
    environment:
      PGHOST: postgres-lab
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: app-lab-db

volumes:
  pg-lab-data:
