<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="860" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="bold">Single Screen: Three Zones, Zero Navigation</text>

  <!-- ── ZONE 1 ── -->
  <rect x="40" y="56" width="780" height="50" rx="6" fill="#f0f4f8" stroke="#1565c0" stroke-width="1.5"/>
  <text x="60" y="74" fill="#1565c0" font-size="11" font-weight="bold">ZONE 1 — SCOPE BAR</text>
  <text x="60" y="94" fill="#777777" font-size="11">"Who am I? What can I see?"</text>
  <text x="500" y="84" fill="#666666" font-size="10">Fixed. Never scrolls. Never hides. Never changes layout.</text>

  <!-- ── ZONE 3 (above Zone 2 — chat history) ── -->
  <rect x="40" y="118" width="780" height="260" rx="6" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="60" y="138" fill="#1b5e20" font-size="11" font-weight="bold">ZONE 3 — CHAT HISTORY (above input, scrollable)</text>
  <text x="60" y="156" fill="#777777" font-size="11">"What did I say? What happened?"</text>

  <!-- Chat pairs inside Zone 3 -->
  <text x="80" y="184" fill="#1565c0" font-size="10">Sie:</text>
  <rect x="80" y="190" width="200" height="22" rx="8" fill="#f0f4f8" stroke="none"/>
  <text x="92" y="206" fill="#0d47a1" font-size="10">günther carnet limit</text>

  <text x="740" y="184" fill="#1b5e20" font-size="10" text-anchor="end">Aktion:</text>
  <rect x="440" y="190" width="300" height="22" rx="8" fill="#e8ecf1" stroke="none"/>
  <rect x="440" y="190" width="3" height="22" rx="1" fill="#1565c0"/>
  <text x="454" y="206" fill="#1a1a1a" font-size="10">Carnet #456 · Limit: 35k → 45k €</text>

  <text x="740" y="226" fill="#555555" font-size="10" text-anchor="end">[System]</text>
  <rect x="440" y="232" width="300" height="22" rx="8" fill="#e8ecf1" stroke="none"/>
  <rect x="440" y="232" width="3" height="22" rx="1" fill="#6b7280"/>
  <text x="454" y="248" fill="#555555" font-size="10">Carnet #789 · Import adjustiert</text>

  <text x="80" y="270" fill="#1565c0" font-size="10">Sie:</text>
  <rect x="80" y="276" width="160" height="22" rx="8" fill="#f0f4f8" stroke="none"/>
  <text x="92" y="292" fill="#0d47a1" font-size="10">becker adresse</text>

  <text x="740" y="270" fill="#1b5e20" font-size="10" text-anchor="end">Aktion:</text>
  <rect x="440" y="276" width="300" height="22" rx="8" fill="#f0f0f5" stroke="none"/>
  <text x="454" y="292" fill="#4a4a4a" font-size="10">T. Klein · Adresse aktualisiert</text>

  <text x="80" y="314" fill="#1565c0" font-size="10">Sie:</text>
  <rect x="80" y="320" width="230" height="22" rx="8" fill="#f0f4f8" stroke="none"/>
  <text x="92" y="336" fill="#0d47a1" font-size="10">prüfung p-012 genehmigen</text>

  <text x="740" y="314" fill="#1b5e20" font-size="10" text-anchor="end">Aktion:</text>
  <rect x="440" y="320" width="300" height="22" rx="8" fill="#e8ecf1" stroke="none"/>
  <rect x="440" y="320" width="3" height="22" rx="1" fill="#1565c0"/>
  <text x="454" y="336" fill="#1a1a1a" font-size="10">Prüfung #012 · Genehmigt</text>

  <!-- Scroll indicators -->
  <text x="430" y="368" text-anchor="middle" fill="#666666" font-size="10" font-style="italic">↑ scroll = older  ·  bottom = newest  ·  ↑ key = recall last Sie:</text>

  <!-- ── JETZT-LINIE ── -->
  <line x1="40" y1="386" x2="820" y2="386" stroke="#1565c0" stroke-width="2.5"/>
  <text x="430" y="382" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="bold">Jetzt-Linie</text>

  <!-- ── ZONE 2 ── -->
  <rect x="40" y="396" width="780" height="100" rx="6" fill="#fafafa" stroke="#1565c0" stroke-width="1.5"/>
  <text x="60" y="416" fill="#38bdf8" font-size="11" font-weight="bold">ZONE 2 — COMMAND FIELD (anchored at bottom)</text>
  <text x="60" y="434" fill="#777777" font-size="11">"What am I doing right now?"</text>

  <!-- Input row -->
  <rect x="60" y="448" width="580" height="28" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="76" y="467" fill="#1a1a1a" font-size="12">günther carnet verschieben müll▌</text>

  <!-- Chip strip -->
  <rect x="60" y="480" width="100" height="18" rx="9" fill="#1565c0" stroke="none"/>
  <text x="72" y="493" fill="#ffffff" font-size="9">#2024-00456</text>
  <rect x="168" y="480" width="130" height="18" rx="4" fill="#c8e6c9" stroke="none"/>
  <text x="176" y="493" fill="#2e7d32" font-size="9">✓ Inhaber wechseln</text>

  <!-- Keyboard hints -->
  <text x="660" y="467" fill="#666666" font-size="10">SPACE=lock  ENTER=do  ESC=back</text>

  <!-- ── ANNOTATIONS ── -->
  <text x="430" y="524" text-anchor="middle" fill="#666666" font-size="11" font-style="italic">One page · Three zones · Zero navigation · Keyboard-first · All expertise levels</text>

</svg>
