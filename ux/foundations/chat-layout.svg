<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="860" height="580" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="bold">Chat Layout: Sie: (left) / Aktion: (right)</text>

  <!-- ── ZONE 1: Scope bar ── -->
  <rect x="30" y="56" width="800" height="36" rx="6" fill="#fafafa" stroke="#1565c0" stroke-width="1.5"/>
  <text x="50" y="70" fill="#777777" font-size="10">ZONE 1</text>
  <text x="50" y="84" fill="#1565c0" font-size="12">Scope bar — Kammer: Aachen  ·  K. Huber  ·  Sachbearbeiter Carnets</text>
  <text x="770" y="78" fill="#666666" font-size="10" text-anchor="end">fixed</text>

  <!-- ── ZONE 3: Chat history (above input) ── -->
  <rect x="30" y="104" width="800" height="340" rx="6" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="50" y="122" fill="#777777" font-size="10">ZONE 3 — CHAT HISTORY (scrolls, bottom = newest)</text>

  <!-- Scroll hint -->
  <text x="430" y="142" text-anchor="middle" fill="#666666" font-size="10" font-style="italic">↑ older exchanges above</text>

  <!-- Chat pair 1 -->
  <text x="60" y="168" fill="#1565c0" font-size="10" font-weight="bold">Sie:  09:14</text>
  <rect x="60" y="174" width="250" height="28" rx="10" fill="#f0f4f8" stroke="none"/>
  <text x="76" y="193" fill="#0d47a1" font-size="12">günther carnet limit 45000</text>

  <text x="780" y="168" text-anchor="end" fill="#1b5e20" font-size="10" font-weight="bold">Aktion:  09:14</text>
  <rect x="440" y="174" width="370" height="38" rx="10" fill="#e8ecf1" stroke="none"/>
  <rect x="440" y="174" width="3" height="38" rx="1" fill="#1565c0"/>
  <text x="456" y="191" fill="#1a1a1a" font-size="11">Carnet #2024-00456 · Günther Maschinenbau AG</text>
  <text x="456" y="206" fill="#1b5e20" font-size="11">Limit geändert: 35.000 → 45.000 €</text>

  <!-- System event (no Sie:) -->
  <text x="780" y="228" text-anchor="end" fill="#555555" font-size="10" font-style="italic">Aktion:  09:31  [System]</text>
  <rect x="440" y="234" width="370" height="30" rx="10" fill="#e8ecf1" stroke="none"/>
  <rect x="440" y="234" width="3" height="30" rx="1" fill="#6b7280"/>
  <text x="456" y="254" fill="#555555" font-size="11">Carnet #789 · Import: Limit adjustiert</text>

  <!-- Chat pair 2 -->
  <text x="60" y="282" fill="#1565c0" font-size="10" font-weight="bold">Sie:  10:02</text>
  <rect x="60" y="288" width="180" height="28" rx="10" fill="#f0f4f8" stroke="none"/>
  <text x="76" y="307" fill="#0d47a1" font-size="12">becker adresse</text>

  <text x="780" y="282" text-anchor="end" fill="#1b5e20" font-size="10" font-weight="bold">Aktion:  10:02</text>
  <rect x="440" y="288" width="370" height="38" rx="10" fill="#f0f0f5" stroke="none"/>
  <text x="456" y="305" fill="#4a4a4a" font-size="11">T. Klein · Firma Becker</text>
  <text x="456" y="320" fill="#4a4a4a" font-size="11">Adresse aktualisiert: Hauptstr. 14 → Nr. 16</text>

  <!-- Chat pair 3 (most recent — closest to input) -->
  <text x="60" y="346" fill="#1565c0" font-size="10" font-weight="bold">Sie:  10:45</text>
  <rect x="60" y="352" width="270" height="28" rx="10" fill="#f0f4f8" stroke="none"/>
  <text x="76" y="371" fill="#0d47a1" font-size="12">prüfung p-012 genehmigen</text>

  <text x="780" y="346" text-anchor="end" fill="#1b5e20" font-size="10" font-weight="bold">Aktion:  10:45</text>
  <rect x="440" y="352" width="370" height="38" rx="10" fill="#e8ecf1" stroke="none"/>
  <rect x="440" y="352" width="3" height="38" rx="1" fill="#1565c0"/>
  <text x="456" y="369" fill="#1a1a1a" font-size="11">K. Huber · Prüfung #2024-P-012</text>
  <text x="456" y="384" fill="#1b5e20" font-size="11">Genehmigt</text>

  <!-- Newest hint -->
  <text x="430" y="416" text-anchor="middle" fill="#666666" font-size="10">↓ newest pair always here, directly above input</text>

  <!-- ── JETZT-LINIE ── -->
  <line x1="30" y1="440" x2="830" y2="440" stroke="#1565c0" stroke-width="2.5"/>
  <text x="430" y="436" text-anchor="middle" fill="#1565c0" font-size="10" font-weight="bold">═══ Jetzt-Linie ═══</text>

  <!-- ── ZONE 2: Command field (anchored at bottom) ── -->
  <rect x="30" y="452" width="800" height="80" rx="6" fill="#fafafa" stroke="#1565c0" stroke-width="1.5"/>
  <text x="50" y="468" fill="#777777" font-size="10">ZONE 2 — COMMAND FIELD (anchored at bottom, like chat input)</text>

  <rect x="50" y="478" width="640" height="30" rx="4" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="498" fill="#666666" font-size="12">Entität oder Befehl eingeben …</text>

  <text x="710" y="498" fill="#666666" font-size="10">ENTER  ·  ↑ recall  ·  ESC</text>

  <!-- ── ANNOTATIONS ── -->
  <text x="430" y="556" text-anchor="middle" fill="#666666" font-size="11" font-style="italic">Left = what I said  ·  Right = what happened  ·  Bottom = where I type next  ·  ↑ = older</text>
  <text x="430" y="574" text-anchor="middle" fill="#cccccc" font-size="10">Metaphor source: WhatsApp / Slack / iMessage — zero learning cost</text>

</svg>
