<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="860" height="620" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" fill="#1a1a1a" font-size="15" font-weight="bold">Arbeitsstrahl Reset Model: git reset with causal dependency</text>

  <!-- ── THE LINEAR TRAIL (before reset) ── -->
  <text x="50" y="68" fill="#777777" font-size="10">BEFORE RESET — the clerk sees one linear trail:</text>

  <!-- Entry boxes -->
  <rect x="50" y="80" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#1565c0" stroke-width="1"/>
  <text x="66" y="100" fill="#1565c0" font-size="11">09:14</text>
  <text x="120" y="100" fill="#0d47a1" font-size="11">günther carnet limit 45000</text>
  <text x="620" y="100" fill="#666666" font-size="10">→ Carnet #456</text>

  <rect x="50" y="116" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="136" fill="#1565c0" font-size="11">09:31</text>
  <text x="120" y="136" fill="#0d47a1" font-size="11">becker adresse</text>
  <text x="620" y="136" fill="#666666" font-size="10">→ Firma Becker</text>

  <rect x="50" y="152" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="172" fill="#1565c0" font-size="11">10:02</text>
  <text x="120" y="172" fill="#0d47a1" font-size="11">prüfung p-012 genehmigen</text>
  <text x="620" y="172" fill="#666666" font-size="10">→ Prüfung #012</text>

  <rect x="50" y="188" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#c62828" stroke-width="1.5"/>
  <text x="66" y="208" fill="#1565c0" font-size="11">10:15</text>
  <text x="120" y="208" fill="#b71c1c" font-size="11">günther carnet inhaber wechseln müller</text>
  <text x="620" y="208" fill="#c62828" font-size="10">→ Carnet #456 ⚠</text>

  <rect x="50" y="224" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="244" fill="#1565c0" font-size="11">10:30</text>
  <text x="120" y="244" fill="#0d47a1" font-size="11">schmidt firma anlegen</text>
  <text x="620" y="244" fill="#666666" font-size="10">→ Firma Schmidt (new)</text>

  <!-- Reset arrow -->
  <line x1="820" y1="95" x2="820" y2="208" stroke="#c62828" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="830" y="155" fill="#c62828" font-size="10" transform="rotate(90 830 155)">RESET TO HERE</text>
  <polygon points="815,95 825,95 820,86" fill="#c62828"/>

  <!-- ── CAUSAL ANALYSIS ── -->
  <line x1="50" y1="272" x2="800" y2="272" stroke="#cccccc" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="430" y="296" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Causal dependency analysis:</text>

  <!-- Dependency boxes -->
  <rect x="50" y="310" width="360" height="100" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="70" y="330" fill="#1b5e20" font-size="11" font-weight="bold">INDEPENDENT (survive reset)</text>
  <text x="70" y="352" fill="#2e7d32" font-size="11">09:31  becker adresse         → Firma Becker</text>
  <text x="70" y="370" fill="#2e7d32" font-size="11">10:02  prüfung genehmigen     → Prüfung #012</text>
  <text x="70" y="388" fill="#2e7d32" font-size="11">10:30  schmidt firma anlegen   → Firma Schmidt</text>
  <text x="70" y="404" fill="#666666" font-size="10">different entities — no data dependency</text>

  <rect x="450" y="310" width="360" height="100" rx="6" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="470" y="330" fill="#b71c1c" font-size="11" font-weight="bold">DEPENDENT (undone by reset)</text>
  <text x="470" y="352" fill="#c62828" font-size="11">10:15  inhaber wechseln       → Carnet #456</text>
  <text x="470" y="374" fill="#666666" font-size="10">same entity as reset point (Carnet #456)</text>
  <text x="470" y="392" fill="#666666" font-size="10">→ moved to reflog (preserved, invisible)</text>

  <!-- ── AFTER RESET ── -->
  <line x1="50" y1="428" x2="800" y2="428" stroke="#cccccc" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="50" y="452" fill="#777777" font-size="10">AFTER RESET — the clerk sees a clean trail:</text>

  <rect x="50" y="464" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="66" y="484" fill="#1565c0" font-size="11">09:14</text>
  <text x="120" y="484" fill="#1b5e20" font-size="11">günther carnet limit 45000</text>
  <text x="620" y="484" fill="#2e7d32" font-size="10">← RESET POINT</text>

  <rect x="50" y="498" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="518" fill="#1565c0" font-size="11">09:31</text>
  <text x="120" y="518" fill="#0d47a1" font-size="11">becker adresse</text>
  <text x="620" y="518" fill="#2e7d32" font-size="10">kept (independent)</text>

  <rect x="50" y="532" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="552" fill="#1565c0" font-size="11">10:02</text>
  <text x="120" y="552" fill="#0d47a1" font-size="11">prüfung p-012 genehmigen</text>
  <text x="620" y="552" fill="#2e7d32" font-size="10">kept (independent)</text>

  <rect x="50" y="566" width="750" height="30" rx="4" fill="#f0f4f8" stroke="#cccccc" stroke-width="1"/>
  <text x="66" y="586" fill="#1565c0" font-size="11">10:30</text>
  <text x="120" y="586" fill="#0d47a1" font-size="11">schmidt firma anlegen</text>
  <text x="620" y="586" fill="#2e7d32" font-size="10">kept (independent)</text>

  <!-- Command field hint -->
  <text x="430" y="612" text-anchor="middle" fill="#666666" font-size="11" font-style="italic">Command field pre-filled with reset-point tokens — clerk modifies and re-executes</text>

</svg>
