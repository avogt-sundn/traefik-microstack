quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=partner_search_ro
quarkus.datasource.password=partner_search_ro
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:postgres-partner-edit}:5432/app-partner-edit-db

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=false
quarkus.flyway.locations=classpath:db/migration

quarkus.http.insecure-requests=disabled
quarkus.tls.key-store.p12.path=certs/keystore.p12
quarkus.tls.key-store.p12.password=changeit
quarkus.native.resources.includes=certs/keystore.p12

quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true

quarkus.package.jar.type=uber-jar

partner.search.max-results=200
partner.complete.max-results=15
quarkus.elasticsearch.hosts=elasticsearch-partner-search:9200
