<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" font-family="system-ui, sans-serif">
  <defs>
    <clipPath id="card-clip"><rect x="148" y="0" width="752" height="600" rx="0"/></clipPath>
  </defs>

  <!-- Page background -->
