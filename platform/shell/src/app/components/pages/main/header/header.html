<div class="header-actions">
  <shell-language-menu></shell-language-menu>

  <button mat-icon-button [matMenuTriggerFor]="accountMenu"
          [attr.aria-label]="'header.account.ariaLabel' | transloco"
          [attr.cypressid]="'cypress-shellHeaderAccountMenuButton'">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #accountMenu="matMenu" xPosition="before" yPosition="below">
    <button mat-menu-item [attr.cypressid]="'cypress-shellHeaderLogoutButton'">
      <mat-icon>logout</mat-icon>
      <span>{{ 'header.account.logout' | transloco }}</span>
    </button>
  </mat-menu>

  @if (client) {
    <img [src]="client.logoUrl"
         [alt]="'header.client.logoAlt' | transloco: {clientName: client.name}"
         class="client-logo"
         [attr.cypressid]="'cypress-shellHeaderClientLogo'">
  }
</div>
